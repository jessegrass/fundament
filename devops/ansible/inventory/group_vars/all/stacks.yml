---
stacks:

  traefik:
    enabled: true
    stack_file: "etc/stacks/traefik.yml"
    stack_name: "traefik"
    main_folder: "/srv/traefik"
    env_vars:
      TRAEFIK_VERSION: "v2.11"
      TRAEFIK_HOSTNAME: "traefik.fundament.unordnung.org"
      TRAEFIK_EMAIL:  "{{ devops.email }}"
      ### To create user:password pair, it's possible to use this command:
      ### echo $(htpasswd -nb user password)
      ### Defaults to admin:admin
      TRAEFIK_BASIC_AUTH: "user:$apr1$M13lILVS$TqQMZMnUtV.1.qlm99Nam1"
    folders:
      - path: "/srv/traefik"
        owner: "{{ users.default.name }}"
        group: root
        mode: "0755"

  cronjob:
    enabled: true
    stack_file: "etc/stacks/cronjob.yml"
    stack_name: "cronjob"
    main_folder: "/srv/cronjob"
    env_vars:
      TZ: "UTC"
      LOG_LEVEL: "info"
      LOG_JSON: "false"
      CRONJOB_VERSION: "1.14"
    folders:
      - path: "/srv/cronjob"
        owner: "{{ users.default.name }}"
        group: root
        mode: "0755"

  project:
    enabled: true
    stack_file: "etc/stacks/fundament.unordnung.org.yml"
    stack_name: "fundament-unordnung-org"
    main_folder: "/srv/fundament"
    env_vars:
      IMAGE_NAME_PREFIX: "ghcr.io/jesse.grass/ansible"
      IMAGE_TAG: "latest"
      STACK_NAME: "fundament-unordnung-org"
      STACK_HOSTNAME: "fundament.unordnung.org"
      STACK_PREFIX: "fundament"
      CERTRESOLVER: "le"
    folders:
      - path: "/srv/fundament"
        owner: "{{ users.default.name }}"
        group: root
        mode: "0755"
      - path: "/srv/fundament/data"
        owner: 500
        group: root
        mode: "0750"
